openapi: 3.1.0
info:
  title: NStream API
  version: 1.0.0
  description: The versioned backend contract for the NStream course project.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/signup:
    post:
      summary: Create an unverified email/password account and send verification email
      responses:
        '201': { description: Account created }
        '422': { description: Invalid email, password, or duplicate email }
        '429': { description: Signup rate limit reached }
  /api/v1/auth/login:
    post:
      summary: Log in a verified account
      responses:
        '200': { description: Access token and refresh token returned }
        '401': { description: Invalid credentials }
        '403': { description: Email verification required }
        '429': { description: Login rate limit reached }
  /api/v1/auth/confirm-verification:
    post:
      summary: Consume a verification token
      responses:
        '200': { description: Email verified }
        '400': { description: Token expired, invalid, or already used }
  /api/v1/auth/request-verification:
    post:
      summary: Request a new verification message without disclosing account existence
      responses:
        '202': { description: Verification request accepted }
  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset message without disclosing account existence
      responses:
        '202': { description: Password reset request accepted }
  /api/v1/auth/reset-password:
    post:
      summary: Consume a reset token and replace the password
      responses:
        '200': { description: Password reset and sessions revoked }
        '400': { description: Token expired, invalid, reused, or password invalid }
  /api/v1/auth/refresh:
    post:
      summary: Rotate an active refresh session
      responses:
        '200': { description: Replacement access and refresh tokens returned }
        '401': { description: Session expired, revoked, or reused }
        '429': { description: Refresh rate limit reached }
  /api/v1/auth/logout:
    post:
      summary: Revoke a refresh session
      responses:
        '204': { description: Session revoked }
  /api/v1/me:
    get:
      summary: Read the authenticated account
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Account returned }
        '401': { description: Missing or invalid access token }
  /api/v1/content/titles:
    get:
      summary: List Watchmode titles through the NStream backend
      parameters:
        - { name: types, in: query, schema: { type: string, example: movie,tv_series } }
        - { name: region, in: query, schema: { type: string, example: US } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, maximum: 250 } }
      responses:
        '200': { description: Normalized content page }
        '503': { description: Watchmode is unavailable or rate limited }
  /api/v1/content/search:
    get:
      summary: Search Watchmode titles by name
      responses:
        '200': { description: Normalized title list }
        '400': { description: Invalid query }
  /api/v1/content/{titleId}:
    get:
      summary: Read normalized Watchmode title details
      responses:
        '200': { description: Normalized content details }
        '404': { description: Content not found }
        '503': { description: Watchmode is unavailable or rate limited }
  /api/v1/content/{titleId}/sources:
    get:
      summary: Read streaming sources for a Watchmode title
      responses:
        '200': { description: Streaming source list }
  /health:
    get:
      summary: Liveness check
      responses:
        '200':
          description: The server process is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'
  /ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Required startup configuration is available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'
        '503':
          description: The server is not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'
  /api/v1/example-validation-error:
    get:
      summary: Validation-error response example
      responses:
        '400':
          description: A request field failed validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ServiceStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    ValidationErrorResponse:
      type: object
      required: [code, message, fields]
      properties:
        code:
          type: string
          example: validation_error
        message:
          type: string
          example: One or more fields are invalid.
        fields:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: Enter a valid email address.
        requestId:
          type: string
          example: 0368d65b-e7aa-493c-8e24-19fb4d92740a
